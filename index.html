<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Server Bot</title>
  <style>
    .button {
      display: inline-block;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      outline: none;
      color: #fff;
      background-color: #007bff;
      border: none;
      border-radius: 5px;
      box-shadow: 0 5px #0069d9;
    }

    .button:hover {
      background-color: #0069d9;
    }

    .button:active {
      background-color: #005cbf;
      box-shadow: 0 4px #0056b3;
      transform: translateY(4px);
    }
  </style>
</head>
<body>
  <button class="button" id="executeButton">Mulai Server ZeeBot</button>

  <script>
    document.getElementById('executeButton').addEventListener('click', function() {
       const { exec } = require('child_process');
       exec('node start.js', (err, stdout, stderr) => {
         if (err) {
           console.error(err);
           return;
         }
         console.log(stdout);
       });
    });
  </script>
</body>
</html>
